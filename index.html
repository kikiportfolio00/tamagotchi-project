<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Tamagotchi</title>
    <style>
        body { background: #1a1a1a; color: #eee; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; overflow: hidden; }
        #game-box { border: 2px solid #444; border-radius: 20px; width: 340px; margin: 10px auto; padding: 15px; background: #2d2d2d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        
        /* ปรับสเตตัสให้จิ๋วลงตามสั่ง */
        .stats { display: flex; justify-content: space-around; margin-bottom: 8px; font-size: 10px; color: #bbb; }
        .stat-item { width: 30%; text-align: center; }
        .stat-bar { background: #444; height: 5px; border-radius: 3px; margin-top: 3px; overflow: hidden; border: 1px solid #333; }
        .fill { height: 100%; transition: 0.3s; width: 100%; }

        /* ฉากเล่นเกม */
        #stage { background: #1f1f1f; height: 160px; border-radius: 12px; position: relative; margin: 10px 0; overflow: hidden; border: 1px solid #333; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        #cat-sprite { font-size: 50px; position: absolute; bottom: 10px; left: 140px; transition: left 0.1s, bottom 0.2s; z-index: 10; }
        #prey { font-size: 30px; position: absolute; bottom: 15px; display: none; }

        /* ปุ่มคำสั่ง */
        .action-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .action-btns button { padding: 8px 2px; font-size: 11px; border-radius: 6px; border: none; color: white; cursor: pointer; font-weight: bold; }
        
        /* ปุ่มบังคับทิศทาง */
        .d-pad { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 12px; }
        .btn-move { background: #3d3d3d; padding: 15px 5px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; }
        .btn-move:active { background: #555; transform: scale(0.9); }
        
        #log { font-size: 12px; color: #888; min-height: 35px; margin-top: 8px; line-height: 1.4; }
        
        .bite { transform: scale(1.3) rotate(-10deg) !important; }
    </style>
</head>
<body>

<div id="game-box">
    <h3 style="margin: 0 0 12px 0; font-size: 18px; color: #ff9800;">🐈 อ้าย Bruno</h3>
    
    <div class="stats">
        <div class="stat-item">หิว<div class="stat-bar"><div id="h-fill" class="fill" style="background:#4caf50"></div></div></div>
        <div class="stat-item">พลัง<div class="stat-bar"><div id="e-fill" class="fill" style="background:#2196f3"></div></div></div>
        <div class="stat-item">อึ<div class="stat-bar"><div id="p-fill" class="fill" style="background:#795548; width:0%"></div></div></div>
    </div>

    <div id="stage">
        <div id="prey">🐀</div>
        <div id="cat-sprite">🐈</div>
    </div>

    <div id="log">บังคับอ้าย Bruno ไปกินหนูเลยอ้าย!</div>

    <div class="action-btns">
        <button style="background: #ff5722;" onclick="spawnPrey()">ออกล่า 🐾</button>
        <button style="background: #616161;" onclick="doLife('sleep')">นอนพัก 💤</button>
        <button style="background: #e91e63;" onclick="doLife('beg')">อ้อนคน 💖</button>
    </div>

    <div class="d-pad">
        <button class="btn-move" onclick="moveCat(-40)">⬅️ ซ้าย</button>
        <button class="btn-move" style="background: #555;" onclick="jumpCat()">โดด ⬆️</button>
        <button class="btn-move" onclick="moveCat(40)">ขวา ➡️</button>
    </div>
    
    <button id="btn-clean" style="width:100%; margin-top:10px; padding:10px; background:#00bcd4; color:white; border:none; border-radius:8px; display:none;" onclick="doLife('clean')">🧹 เก็บอึให้อ้าย</button>
</div>

<script>
    let h = 100, e = 100, p = 0, catX = 140, isHunting = false;

    function updateUI(msg) {
        const cat = document.getElementById('cat-sprite');
        if (h <= 0) { h = 0; msg = "อ้าย Bruno ขิตแล้ว..."; cat.innerText = "🪦"; }
        if (p >= 100) { 
            msg = "อ้ายอึแตก! เก็บด่วน 🧹"; 
            document.getElementById('btn-clean').style.display = "block";
        } else {
            document.getElementById('btn-clean').style.display = "none";
        }
        document.getElementById('h-fill').style.width = h + "%";
        document.getElementById('e-fill').style.width = e + "%";
        document.getElementById('p-fill').style.width = p + "%";
        document.getElementById('log').innerHTML = msg;
    }

    function moveCat(dist) {
        if (p >= 100 || h <= 0) return;
        catX = Math.max(0, Math.min(280, catX + dist));
        document.getElementById('cat-sprite').style.left = catX + "px";
        checkHit();
    }

    function jumpCat() {
        if (p >= 100 || h <= 0) return;
        const cat = document.getElementById('cat-sprite');
        if (cat.style.bottom === "80px") return;
        cat.style.bottom = "80px";
        setTimeout(() => { cat.style.bottom = "10px"; setTimeout(checkHit, 150); }, 300);
    }

    function spawnPrey() {
        if (p >= 100 || h <= 0 || e < 20) return updateUI("พลังไม่พอ...");
        isHunting = true; e -= 15;
        const prey = document.getElementById('prey');
        prey.style.display = "block";
        prey.style.left = Math.floor(Math.random() * 260) + "px";
        updateUI("หนูมาแล้ว! บังคับอ้ายไปงับเลย");
    }

    function checkHit() {
        if (!isHunting) return;
        const cat = document.getElementById('cat-sprite');
        const prey = document.getElementById('prey');
        if (Math.abs(cat.offsetLeft - prey.offsetLeft) < 45 && cat.style.bottom === "10px") {
            isHunting = false; prey.style.display = "none";
            h = Math.min(100, h + 35); p = Math.min(100, p + 20);
            cat.classList.add('bite');
            setTimeout(() => cat.classList.remove('bite'), 300);
            updateUI("งับหนูเรียบร้อย! 🐀 หวานเจี๊ยบ");
        }
    }

    function doLife(type) {
        if (type === 'sleep') { h -= 5; e = Math.min(100, e + 50); updateUI("อ้ายหลับปุ๋ย พลังมาเต็ม!"); }
        if (type === 'beg') { h = Math.min(100, h + 15); p += 10; updateUI("อ้อนจนได้หนม! 💖"); }
        if (type === 'clean') { p = 0; updateUI("ล้างห้องน้ำสะอาดแล้ว!"); }
    }
</script>
</body>
</html>
