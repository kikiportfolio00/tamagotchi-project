<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cat Tamagotchi</title>
    <style>
        body { background: #222; color: #fff; font-family: sans-serif; text-align: center; }
        #game-box { border: 5px solid #555; border-radius: 20px; width: 300px; margin: 50px auto; padding: 20px; background: #333; }
        .stat-bar { background: #eee; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .fill { background: #4caf50; height: 100%; transition: 0.3s; }
        #cat-sprite { font-size: 80px; margin: 20px 0; transition: 0.3s; }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { opacity: 0.8; }
        #log { margin-top: 15px; font-size: 14px; color: #aaa; min-height: 40px; }
    </style>
</head>
<body>

<div id="game-box">
    <h3>Cat Sim v1.0</h3>
    <div id="status-area">
        หิว: <div class="stat-bar"><div id="hunger-fill" class="fill" style="width: 100%;"></div></div>
        พลัง: <div class="stat-bar"><div id="energy-fill" class="fill" style="width: 100%; background: #2196f3;"></div></div>
    </div>

    <div id="cat-sprite">🐱</div>
    <div id="log">ยินดีต้อนรับเจ้าทาส...</div>

    <div class="btns">
        <button onclick="hunt()" style="background: #ff5722;">ออกล่า 🦎</button>
        <button onclick="sleep()" style="background: #ffc107;">นอนพัก 💤</button>
        <button onclick="beg()" style="background: #e91e63;">อ้อนพ่อ 💖</button>
        <button onclick="flee()" style="background: #9c27b0;">หนีแมวจร 🏃</button>
    </div>
</div>

<script>
    // --- ระบบกันก๊อป (Domain Lock) ---
    // เปลี่ยน 'yourusername.github.io' เป็นชื่อ GitHub ของคุณ
    const validDomain = 'yourusername.github.io'; 
    if (window.location.hostname !== validDomain && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        document.body.innerHTML = "<h1>⚠️ ลิขสิทธิ์เฉพาะเจ้าของโปรเจกต์เท่านั้น</h1>";
    }

    let hunger = 100;
    let energy = 100;

    function updateUI(msg) {
        document.getElementById('hunger-fill').style.width = hunger + "%";
        document.getElementById('energy-fill').style.width = energy + "%";
        document.getElementById('log').innerText = msg;
        
        if (hunger <= 0) {
            document.getElementById('cat-sprite').innerText = "🪦";
            document.getElementById('log').innerText = "แมวขิตแล้ว...";
        }
    }

    function hunt() {
        if (energy < 20) return updateUI("เหนื่อยเกินไป ล่าไม่ไหว...");
        let success = Math.random() > 0.4;
        if (success) {
            hunger = Math.min(100, hunger + 20);
            energy -= 15;
            updateUI("จับจิ้งจกได้! อิ่มจัง");
        } else {
            energy -= 10;
            updateUI("จิ้งจกหางขาด หนีไปได้...");
        }
    }

    function sleep() {
        energy = Math.min(100, energy + 30);
        hunger -= 5;
        updateUI("หลับปุ๋ย... พลังกลับมาแล้ว");
    }

    // ฟังก์ชันอื่นๆ เดี๋ยวค่อยมาเติมความมันส์กันครับ
</script>
</body>
</html>
