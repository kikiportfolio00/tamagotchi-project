<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Tamagotchi</title>
    <style>
        body { background: #222; color: #fff; font-family: sans-serif; text-align: center; }
        #game-box { border: 5px solid #555; border-radius: 20px; width: 300px; margin: 50px auto; padding: 20px; background: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .stat-bar { background: #eee; height: 12px; border-radius: 6px; margin: 10px 0; overflow: hidden; }
        .fill { background: #4caf50; height: 100%; transition: 0.5s; width: 100%; }
        #cat-sprite { font-size: 80px; margin: 20px 0; height: 100px; display: flex; align-items: center; justify-content: center; }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; color: white; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        #log { margin-top: 15px; font-size: 14px; color: #ccc; min-height: 45px; line-height: 1.4; }
    </style>
</head>
<body>

<div id="game-box">
    <h3 style="margin-top:0;">🐈 Cat Hunter Sim</h3>
    <div id="status-area" style="text-align: left; font-size: 13px;">
        หิว (Hunger): <div class="stat-bar"><div id="hunger-fill" class="fill"></div></div>
        พลัง (Energy): <div class="stat-bar"><div id="energy-fill" class="fill" style="background: #2196f3;"></div></div>
    </div>

    <div id="cat-sprite">🐈</div>
    <div id="log">ยินดีต้อนรับเจ้าทาส! ออกไปล่ากันเถอะ</div>

    <div class="btns">
        <button onclick="hunt()" style="background: #ff5722;">ออกล่า 🐾</button>
        <button onclick="sleep()" style="background: #444;">นอนพัก 💤</button>
        <button onclick="beg()" style="background: #e91e63;">อ้อนคน 💖</button>
        <button onclick="flee()" style="background: #9c27b0;">หนีแมวจร 🏃</button>
    </div>
</div>

<script>
    // --- ระบบกันก๊อป (Domain Lock) ---
    const validDomain = 'kikiportfolio00.github.io'; 
    if (window.location.hostname !== validDomain && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        document.body.innerHTML = "<h2 style='margin-top:100px;'>⚠️ ลิขสิทธิ์เฉพาะเจ้าของโปรเจกต์ (kikiportfolio00) เท่านั้น</h2>";
    }

    let hunger = 100;
    let energy = 100;

    function updateUI(msg, emoji = "🐈") {
        if (hunger <= 0) {
            hunger = 0;
            emoji = "🪦";
            msg = "แมวขิตแล้ว... (อดตาย)";
        }
        document.getElementById('hunger-fill').style.width = hunger + "%";
        document.getElementById('energy-fill').style.width = energy + "%";
        document.getElementById('cat-sprite').innerText = emoji;
        document.getElementById('log').innerText = msg;
    }

    function hunt() {
        if (hunger <= 0) return;
        if (energy < 20) return updateUI("เหนื่อยเกินไป ล่าไม่ไหวแล้ว...", "😿");

        let roll = Math.random();
        energy -= 15;
        hunger -= 5; // ล่าแล้วยิ่งหิว

        if (roll > 0.4) { // 60% เจอจิ้งจก
            hunger = Math.min(100, hunger + 15);
            updateUI("จับ 'จิ้งจก' 🦎 ได้! รสชาติเค็มๆ ดี", "😼");
        } else if (roll > 0.1) { // 30% เจอนก
            hunger = Math.min(100, hunger + 30);
            updateUI("สุดยอด! จับ 'นก' 🐦 ได้ อิ่มไปอีกมื้อ", "😸");
        } else { // 10% เจองู (ตัวตึงตามสตอรี่)
            let survive = Math.random() > 0.5;
            if (survive) {
                hunger = Math.min(100, hunger + 60);
                updateUI("โหดจัด! ฆ่า 'งูพิษ' 🐍 ได้ อิ่มระดับราชา", "😼");
            } else {
                energy -= 40;
                updateUI("พลาด! โดนงู 🐍 ฉกเข้าที่จมูก เจ็บหนักเลย", "🙀");
            }
        }
    }

    function sleep() {
        if (hunger <= 0) return;
        energy = Math.min(100, energy + 40);
        hunger -= 10;
        updateUI("หลับปุ๋ย... ฝันว่าได้จับหนู", "💤");
    }

    function beg() {
        if (hunger <= 0) return;
        let gift = Math.random() > 0.5;
        if (gift) {
            hunger = Math.min(100, hunger + 25);
            updateUI("อ้อนสำเร็จ! ได้กินขนมแมวเลีย", "😽");
        } else {
            updateUI("คนเดินหนี... ไม่ได้อะไรเลย", "😿");
        }
    }

    function flee() {
        if (hunger <= 0) return;
        energy -= 20;
        updateUI("วิ่งหนีแมวจรเจ้าถิ่นพ้นแล้ว! เหนื่อยแฮก", "🏃");
    }

    // ระบบความหิวลดลงตามเวลา (Game Loop)
    setInterval(() => {
        if (hunger > 0) {
            hunger -= 1;
            updateUI(document.getElementById('log').innerText, document.getElementById('cat-sprite').innerText);
        }
    }, 60000); // ลดทุก 1 นาที
</script>
</body>
</html>
