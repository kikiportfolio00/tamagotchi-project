<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Tamagotchi</title>
    <style>
        body { background: #222; color: #fff; font-family: sans-serif; text-align: center; }
        #game-box { border: 5px solid #555; border-radius: 20px; width: 320px; margin: 50px auto; padding: 20px; background: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .stat-bar { background: #eee; height: 12px; border-radius: 6px; margin: 8px 0; overflow: hidden; }
        .fill { background: #4caf50; height: 100%; transition: 0.5s; width: 100%; }
        #cat-sprite { font-size: 70px; margin: 20px 0; height: 100px; display: flex; align-items: center; justify-content: center; position: relative; }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; color: white; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #666 !important; cursor: not-allowed; }
        #log { margin-top: 15px; font-size: 14px; color: #ccc; min-height: 45px; line-height: 1.4; }
    </style>
</head>
<body>

<div id="game-box">
    <h3 style="margin:0 0 15px 0;">🐈 Bruno Tamagotchi</h3>
    <div id="status-area" style="text-align: left; font-size: 13px;">
        หิว (Hunger): <div class="stat-bar"><div id="hunger-fill" class="fill"></div></div>
        พลัง (Energy): <div class="stat-bar"><div id="energy-fill" class="fill" style="background: #2196f3;"></div></div>
        ปวดท้อง (Poop): <div class="stat-bar"><div id="poop-fill" class="fill" style="background: #795548; width: 0%;"></div></div>
    </div>

    <div id="cat-sprite">🐈</div>
    <div id="log">ยินดีต้อนรับ! พาน้อง Bruno ออกไปล่ากัน</div>

    <div class="btns">
        <button id="hunt-btn" onclick="hunt()" style="background: #ff5722;">ออกล่า 🐾</button>
        <button id="sleep-btn" onclick="sleep()" style="background: #444;">นอนพัก 💤</button>
        <button id="beg-btn" onclick="beg()" style="background: #e91e63;">อ้อนคน 💖</button>
        <button id="clean-btn" onclick="clean()" style="background: #00bcd4; display: none;">เก็บอึ 🧹</button>
    </div>
</div>

<script>
    // --- ระบบกันก๊อป (Domain Lock) สำหรับ kikiportfolio00 ---
    const validDomain = 'kikiportfolio00.github.io'; 
    if (window.location.hostname !== validDomain && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        document.body.innerHTML = "<h2 style='margin-top:100px;'>⚠️ ลิขสิทธิ์เฉพาะเจ้าของโปรเจกต์เท่านั้น</h2>";
    }

    let hunger = 100;
    let energy = 100;
    let poopLevel = 0;
    let isDirty = false;

    function updateUI(msg, emoji = "🐈") {
        if (hunger <= 0) {
            hunger = 0;
            emoji = "🪦";
            msg = "Bruno ขิตแล้ว... (อดตาย)";
            disableButtons(true);
        }

        // เช็คอึแตก
        if (poopLevel >= 100) {
            isDirty = true;
            emoji = "🐈💩";
            msg = "Bruno อึแตกแล้ว! เก็บกวาดด่วน 🧹";
            document.getElementById('clean-btn').style.display = "block";
            disableButtons(true);
        } else {
            document.getElementById('clean-btn').style.display = "none";
            if (hunger > 0) disableButtons(false);
        }

        document.getElementById('hunger-fill').style.width = hunger + "%";
        document.getElementById('energy-fill').style.width = energy + "%";
        document.getElementById('poop-fill').style.width = poopLevel + "%";
        document.getElementById('cat-sprite').innerText = emoji;
        document.getElementById('log').innerText = msg;
    }

    function disableButtons(status) {
        document.getElementById('hunt-btn').disabled = status;
        document.getElementById('sleep-btn').disabled = status;
        document.getElementById('beg-btn').disabled = status;
    }

    function hunt() {
        if (hunger <= 0 || isDirty) return;
        if (energy < 20) return updateUI("Bruno เหนื่อยเกินไป ล่าไม่ไหวแล้ว...", "😿");

        energy -= 15;
        let roll = Math.random();
        
        if (roll > 0.3) { // เจอจิ้งจก 70%
            hunger = Math.min(100, hunger + 20);
            poopLevel += 25;
            updateUI("จับจิ้งจกได้! อร่อยเลย 😼", "😼");
        } else { // เจออะไรที่ใหญ่กว่า 30%
            hunger = Math.min(100, hunger + 40);
            poopLevel += 35;
            updateUI("สุดยอด! วันนี้ได้กินนก 🐦", "😸");
        }
    }

    function sleep() {
        if (hunger <= 0 || isDirty) return;
        energy = Math.min(100, energy + 40);
        hunger -= 5;
        updateUI("Bruno กำลังหลับปุ๋ย...", "💤");
    }

    function beg() {
        if (hunger <= 0 || isDirty) return;
        hunger = Math.min(100, hunger + 15);
        poopLevel += 10;
        updateUI("อ้อนจนได้หนมแมวเลีย 💖", "😽");
    }

    function clean() {
        poopLevel = 0;
        isDirty = false;
        updateUI("ล้างห้องน้ำสะอาดแล้ว Bruno พร้อมลุยต่อ!", "😸");
    }

    // ระบบลด
