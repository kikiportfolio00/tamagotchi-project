<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Tamagotchi</title>
    <style>
        body { background: #1a1a1a; color: #eee; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #game-box { border: 2px solid #444; border-radius: 25px; width: 320px; margin: 30px auto; padding: 25px; background: #2d2d2d; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .stat-group { text-align: left; font-size: 14px; margin-bottom: 12px; }
        .stat-label { font-weight: bold; color: #bbb; display: flex; justify-content: space-between; margin-bottom: 4px; }
        .stat-bar { background: #444; height: 12px; border-radius: 6px; overflow: hidden; }
        .fill { background: #4caf50; height: 100%; transition: 0.5s ease; width: 100%; }
        #hunger-fill { background: #4caf50; }
        #energy-fill { background: #2196f3; }
        #poop-fill { background: #795548; width: 0%; }
        #cat-sprite { font-size: 80px; margin: 20px 0; height: 100px; display: flex; align-items: center; justify-content: center; }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; color: white; transition: 0.2s; font-size: 14px; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #555 !important; color: #888; cursor: not-allowed; }
        #log { margin-top: 20px; font-size: 14px; color: #ddd; min-height: 45px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="game-box">
    <h3>🐈‍⬛ อ้าย Bruno (วิเชียรมาศ)</h3>
    
    <div class="stat-group">
        <div class="stat-label"><span>หิว (Hunger)</span><span id="hunger-val">100%</span></div>
        <div class="stat-bar"><div id="hunger-fill" class="fill"></div></div>
    </div>
    <div class="stat-group">
        <div class="stat-label"><span>พลัง (Energy)</span><span id="energy-val">100%</span></div>
        <div class="stat-bar"><div id="energy-fill" class="fill"></div></div>
    </div>
    <div class="stat-group">
        <div class="stat-label"><span>ปวดท้อง (Poop)</span><span id="poop-val">0%</span></div>
        <div class="stat-bar"><div id="poop-fill" class="fill"></div></div>
    </div>

    <div id="cat-sprite">🐈‍⬛</div>
    <div id="log">ยินดีต้อนรับ! พาอ้าย Bruno ออกไปล่ากัน</div>

    <div class="btns">
        <button id="hunt-btn" onclick="hunt()" style="background: #ff5722;">ออกล่า 🐾</button>
        <button id="sleep-btn" onclick="sleep()" style="background: #616161;">นอนพัก 💤</button>
        <button id="beg-btn" onclick="beg()" style="background: #e91e63;">อ้อนคน 💖</button>
        <button id="clean-btn" onclick="clean()" style="background: #00bcd4; display: none;">เก็บอึ 🧹</button>
    </div>
</div>

<script>
    let hunger = 100;
    let energy = 100;
    let poopLevel = 0;
    let isDirty = false;

    function updateUI(msg, emoji = "🐈‍⬛") {
        if (hunger <= 0) {
            hunger = 0;
            emoji = "🪦";
            msg = "อ้าย Bruno ขิตแล้ว... (อดตาย)";
            disableButtons(true);
        }

        if (poopLevel >= 100) {
            isDirty = true;
            emoji = "🐈‍⬛💩";
            msg = "อ้าย Bruno อึแตก! เก็บกวาดด่วน 🧹";
            document.getElementById('clean-btn').style.display = "block";
            disableButtons(true);
        } else {
            document.getElementById('clean-btn').style.display = "none";
            if (hunger > 0) disableButtons(false);
        }

        document.getElementById('hunger-fill').style.width = hunger + "%";
        document.getElementById('hunger-val').innerText = hunger + "%";
        document.getElementById('energy-fill').style.width = energy + "%";
        document.getElementById('energy-val').innerText = energy + "%";
        document.getElementById('poop-fill').style.width = poopLevel + "%";
        document.getElementById('poop-val').innerText = poopLevel + "%";
        document.getElementById('cat-sprite').innerText = emoji;
        document.getElementById('log').innerText = msg;
    }

    function disableButtons(status) {
        document.getElementById('hunt-btn').disabled = status;
        document.getElementById('sleep-btn').disabled = status;
        document.getElementById('beg-btn').disabled = status;
    }

    function hunt() {
        if (hunger <= 0 || isDirty) return;
        if (energy < 20) return updateUI("อ้ายเหนื่อยเกินไป ล่าไม่ไหว...", "😿‍⬛");

        energy -= 15;
        let roll = Math.random();
        if (roll > 0.4) {
            hunger = Math.min(100, hunger + 20);
            poopLevel += 25;
            updateUI("อ้ายจับหนูได้! 🐀 รสชาติเด็ด", "😼‍⬛");
        } else {
            hunger = Math.min(100, hunger + 10);
            poopLevel += 15;
            updateUI("ได้แค่แมลงสาบ... 🪳 แก้ขัดไปก่อน", "😼‍⬛");
        }
    }

    function sleep() {
        if (hunger <= 0 || isDirty) return;
        energy = Math.min(100, energy + 40);
        hunger -= 5;
        updateUI("อ้าย Bruno กำลังหลับปุ๋ย...", "💤‍⬛");
    }

    function beg() {
        if (hunger <= 0 || isDirty) return;
        hunger = Math.min(100, hunger + 15);
        poopLevel += 10;
        updateUI("อ้อนจนได้ขนมแมวเลีย 💖", "😸‍⬛");
    }

    function clean() {
        poopLevel = 0;
        isDirty = false;
        updateUI("ล้างห้องน้ำให้อ้ายสะอาดแล้ว!", "😸‍⬛");
    }

    setInterval(() => {
        if (hunger > 0 && !isDirty) {
            hunger -= 2;
            updateUI(document.getElementById('log').innerText, document.getElementById('cat-sprite').innerText);
        }
    }, 60000);

    updateUI("ยินดีต้อนรับ! พาอ้าย Bruno ออกไปล่ากัน");
</script>
</body>
