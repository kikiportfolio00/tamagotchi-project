<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno GameBoy Audio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        :root { --gb-screen: #8b956d; --gb-dark: #1f1f21; --gb-body: #9ca0a8; }
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Press Start 2P', cursive; }
        #gameboy { width: 320px; background: var(--gb-body); padding: 25px; border-radius: 10px 10px 50px 10px; border: 4px solid #777; box-shadow: 10px 10px 0 #000; }
        #screen-border { background: #333; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        #screen { background: var(--gb-screen); height: 150px; border: 3px solid #555; position: relative; overflow: hidden; image-rendering: pixelated; }
        .mini-hud { display: flex; gap: 5px; padding: 5px; font-size: 5px; color: var(--gb-dark); }
        .bar-bg { background: rgba(0,0,0,0.1); height: 3px; width: 30px; border: 1px solid var(--gb-dark); }
        .fill { background: var(--gb-dark); height: 100%; transition: 0.3s; }
        #cat { font-size: 40px; position: absolute; bottom: 10px; left: 110px; animation: bounce 0.8s steps(2) infinite; filter: grayscale(100%); }
        @keyframes bounce { from { transform: scaleY(1); } to { transform: scaleY(0.9); } }
        #target { position: absolute; font-size: 20px; display: none; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .d-pad { display: grid; grid-template-columns: 35px 35px 35px; grid-template-rows: 35px 35px 35px; }
        .d-btn { background: var(--gb-dark); border: none; cursor: pointer; color: #555; }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .a-btn { width: 45px; height: 45px; border-radius: 50%; background: #a22; border: 3px solid #000; box-shadow: 3px 3px 0 #000; color: #000; font-size: 6px; cursor: pointer; }
        .a-btn:active { transform: translate(2px, 2px); box-shadow: 0 0; }
        #msg { font-size: 6px; color: var(--gb-dark); position: absolute; bottom: 5px; width: 100%; text-align: center; }
    </style>
</head>
<body>

<div id="gameboy">
    <div id="screen-border">
        <div id="screen">
            <div class="mini-hud">
                <div>H<div class="bar-bg"><div id="h-f" class="fill" style="width:100%"></div></div></div>
                <div>E<div class="bar-bg"><div id="e-f" class="fill" style="width:100%"></div></div></div>
                <div>P<div class="bar-bg"><div id="p-f" class="fill" style="width:0%"></div></div></div>
            </div>
            <div id="target">🐀</div>
            <div id="cat">🐈</div>
            <div id="msg">BRUNO READY_</div>
        </div>
    </div>
    <div class="controls">
        <div class="d-pad">
            <div></div><button class="d-btn" onclick="jump()">▲</button><div></div>
            <button class="d-btn" onclick="move(-30)">◀</button><div style="background:var(--gb-dark)"></div><button class="d-btn" onclick="move(30)">▶</button>
            <div></div><button class="d-btn">▼</button><div></div>
        </div>
        <div class="action-btns">
            <button class="a-btn" onclick="act('hunt')">HUNT</button>
            <button class="a-btn" onclick="act('feed')">FEED</button>
            <button class="a-btn" onclick="act('sleep')">ZZZ</button>
            <button class="a-btn" onclick="act('beg')">LOVE</button>
        </div>
    </div>
</div>

<script>
    let h=100, e=100, p=0, x=110, hunting=false;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function update(txt) {
        document.getElementById('h-f').style.width = h+'%';
        document.getElementById('e-f').style.width = e+'%';
        document.getElementById('p-f').style.width = p+'%';
        document.getElementById('msg').innerText = txt.toUpperCase();
    }

    function move(d) {
        playSound(150, 'square', 0.05);
        x = Math.max(0, Math.min(240, x+d));
        document.getElementById('cat').style.left = x+'px';
        check();
    }

    function jump() {
        playSound(400, 'square', 0.1);
        const c = document.getElementById('cat');
        c.style.bottom = "70px";
        setTimeout(() => { c.style.bottom="10px"; check(); }, 300);
    }

    function act(type) {
        playSound(600, 'sine', 0.1);
        if(type==='feed') { h=Math.min(100,h+20); p+=10; update("yummy!"); }
        if(type==='sleep') { e=Math.min(100,e+40); h-=5; update("sleeping..."); }
        if(type==='hunt') { e-=15; spawn(); update("catch it!"); }
        if(type==='beg') { h+=5; update("love you!"); }
    }

    function spawn() { hunting=true; const t = document.getElementById('target'); t.style.display="block"; t.style.left = Math.random()*230+"px"; }

    function check() {
        const c=document.getElementById('cat'), t=document.getElementById('target');
        if(hunting && Math.abs(c.offsetLeft - t.offsetLeft) < 30) {
            playSound(800, 'square', 0.2);
            hunting=false; t.style.display="none"; h=Math.min(100,h+30); update("got mouse!");
        }
    }
    update("bruno_v1");
</script>
</body>
</html>
