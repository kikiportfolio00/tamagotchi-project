<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Gameboy Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        /* คลุมโทน Gameboy ขาว-ดำ-เขียวขี้ม้า */
        :root {
            --bg: #8b956d;
            --dark: #1f1f1f;
            --pixel: #43523d;
        }

        body { background: #121212; color: var(--dark); font-family: 'Press Start 2P', cursive; display: flex; justify-content: center; padding-top: 20px; }
        
        #game-box { 
            width: 320px; background: var(--bg); border: 10px solid #333; 
            border-radius: 10px; padding: 15px; box-shadow: 0 20px 0 #222;
        }

        /* แถบพลังแบบจิ๋วพิเศษ */
        .mini-stats { display: flex; justify-content: space-between; font-size: 6px; margin-bottom: 10px; }
        .stat-group { width: 30%; }
        .bar { height: 4px; border: 1px solid var(--dark); background: rgba(0,0,0,0.1); margin-top: 2px; }
        .fill { height: 100%; background: var(--dark); transition: 0.3s; }

        /* หน้าจอหลัก */
        #screen { 
            height: 120px; border: 3px solid var(--dark); position: relative; 
            background: rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 15px;
        }

        /* แมว Pixel Animation */
        #cat {
            font-size: 40px; position: absolute; bottom: 10px; left: 130px;
            animation: idle 1s steps(2) infinite; /* ขยับแบบ 8-bit */
            filter: grayscale(100%) contrast(200%);
        }

        @keyframes idle {
            from { transform: scaleY(1); }
            to { transform: scaleY(0.9) translateY(2px); }
        }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        
        /* ปุ่มจิ๋วสไตล์ 8-bit */
        button { 
            font-family: 'Press Start 2P', cursive; font-size: 6px; padding: 8px 0;
            border: 2px solid var(--dark); background: var(--bg); cursor: pointer;
            box-shadow: 2px 2px 0 var(--dark);
        }
        button:active { transform: translate(2px, 2px); box-shadow: 0 0 0; }

        .d-pad { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        #log { font-size: 6px; margin: 10px 0; height: 20px; border-bottom: 1px solid var(--dark); }
    </style>
</head>
<body>

<div id="game-box">
    <div class="mini-stats">
        <div class="stat-group">HNG<div class="bar"><div id="h-fill" class="fill" style="width:100%"></div></div></div>
        <div class="stat-group">ENR<div class="bar"><div id="e-fill" class="fill" style="width:100%"></div></div></div>
        <div class="stat-group">POP<div class="bar"><div id="p-fill" class="fill" style="width:0%"></div></div></div>
    </div>

    <div id="screen">
        <div id="cat">🐈</div>
        <div id="item" style="position:absolute; display:none; font-size:20px;">🐀</div>
    </div>

    <div id="log">BRUNO READY_</div>

    <div class="action-grid">
        <button onclick="act('hunt')">HUNT</button>
        <button onclick="act('feed')">FEED</button>
        <button onclick="act('sleep')">SLEEP</button>
        <button onclick="act('beg')">BEG</button>
    </div>

    <div class="d-pad">
        <button onclick="move(-30)">LEFT</button>
        <button onclick="jump()">JUMP</button>
        <button onclick="move(30)">RIGHT</button>
    </div>
</div>

<script>
    let h=100, e=100, p=0, x=130;

    function update(msg) {
        document.getElementById('h-fill').style.width = h+'%';
        document.getElementById('e-fill').style.width = e+'%';
        document.getElementById('p-fill').style.width = p+'%';
        document.getElementById('log').innerText = msg.toUpperCase();
    }

    function move(d) {
        x = Math.max(0, Math.min(260, x + d));
        document.getElementById('cat').style.left = x + 'px';
        check();
    }

    function jump() {
        const c = document.getElementById('cat');
        c.style.bottom = "60px";
        setTimeout(() => { c.style.bottom = "10px"; check(); }, 300);
    }

    function act(type) {
        if(type==='feed') { h=Math.min(100,h+20); p+=10; update("yummy_"); }
        if(type==='sleep') { e=Math.min(100,e+40); h-=5; update("zzz_"); }
        if(type==='hunt') { e-=10; spawn(); update("hunting_"); }
    }

    function spawn() {
        const i = document.getElementById('item');
        i.style.display = "block";
        i.style.left = Math.random()*250+"px";
    }

    function check() {
        const c = document.getElementById('cat'), i = document.getElementById('item');
        if(i.style.display !== "none" && Math.abs(c.offsetLeft - i.offsetLeft) < 30) {
            i.style.display = "none"; h=Math.min(100,h+30); update("got_it!");
        }
    }
</script>
</body>
</html>
